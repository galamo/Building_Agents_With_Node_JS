services:
  db:
    image: pgvector/pgvector:pg17
    container_name: lab12-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: image_rag
    ports:
      - "5432:5432"
    volumes:
      - lab12_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d image_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lab12_pgvector_data:
